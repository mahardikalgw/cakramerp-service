global:
  scrape_interval: 30s
  evaluation_interval: 30s

# ── Alert rules (ISO 27001 A.12.4 / A.16.1) ────────────
rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'cakramerp-service'
    static_configs:
      - targets: ['app:3000']
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: 'cakramerp-document'
    static_configs:
      - targets: ['doc:8080']
    metrics_path: /actuator/prometheus
    scrape_interval: 30s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']