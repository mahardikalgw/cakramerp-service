# ── Memory ──────────────────────────────────────────────
shared_buffers = 512MB
effective_cache_size = 2GB
work_mem = 16MB
maintenance_work_mem = 128MB

max_connections = 100

# ── Write Ahead Log ────────────────────────────────────
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB

# ── Query Planner ──────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200

# ── SSL/TLS (ISO 27001 A.10.1 / A.13.1) ────────────────
ssl = on
ssl_cert_file = '/etc/ssl/postgres/server.crt'
ssl_key_file = '/etc/ssl/postgres/server.key'
ssl_ca_file = '/etc/ssl/postgres/ca.crt'
ssl_min_protocol_version = 'TLSv1.2'
ssl_ciphers = 'HIGH:!aNULL:!eNULL:!MD5:!3DES:!DES'
ssl_prefer_server_ciphers = on

# ── Logging (ISO 27001 A.12.4) ─────────────────────────
log_min_duration_statement = 500ms
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h'

# ── Autovacuum ─────────────────────────────────────────
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
