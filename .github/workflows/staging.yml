name: CI — Staging

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cakramerp-service

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  test:
    name: Unit Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cakramerp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: cakramerp_test
      DB_SCHEMA: public
      DB_SYNCHRONIZE: true
      DB_LOGGING: false
      DB_SSL: false
      DB_POOL_SIZE: 5
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: test-jwt-secret-ci-only-minimum-32-bytes
      JWT_EXPIRATION: 1h
      JWT_REFRESH_SECRET: test-refresh-secret-ci-only-minimum-32-bytes
      JWT_REFRESH_EXPIRATION: 1d
      PORT: 3000
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:3000
      DOCUMENT_SERVICE_URL: http://localhost:8080
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
      MINIO_USE_SSL: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:ci

  docker:
    name: Docker Build & Push (staging)
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:staging
            ${{ env.IMAGE_NAME }}:staging-sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: "tag:ci-deployer"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_VM_HOST }}
          username: ${{ secrets.STAGING_VM_USER }}
          key: ${{ secrets.STAGING_VM_SSH_KEY }}
          command_timeout: 30m
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:staging-sha-${{ steps.sha.outputs.short }}
            docker tag ${{ env.IMAGE_NAME }}:staging-sha-${{ steps.sha.outputs.short }} ${{ env.IMAGE_NAME }}:staging

            echo "▶ Dropping and recreating database..."
            docker exec -i cakramerp-postgres-staging psql -U postgres <<'SQL'
            SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'cakramerp' AND pid <> pg_backend_pid();
            DROP DATABASE IF EXISTS cakramerp;
            CREATE DATABASE cakramerp;
            SQL
            echo "✓ Database recreated"

            echo "▶ Running database migrations..."
            docker run --rm \
              --network host \
              --env-file /opt/cakramerp/staging.env \
              ${{ env.IMAGE_NAME }}:staging-sha-${{ steps.sha.outputs.short }} \
              node dist/database/migrate.js
            echo "✓ Migrations complete"

            docker stop cakramerp-service-staging 2>/dev/null || true
            docker rm cakramerp-service-staging 2>/dev/null || true
            docker run -d \
              --name cakramerp-service-staging \
              --restart unless-stopped \
              --network host \
              --env-file /opt/cakramerp/staging.env \
              ${{ env.IMAGE_NAME }}:staging-sha-${{ steps.sha.outputs.short }}
