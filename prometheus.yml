global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # cakramerp-service — OTel metrics are pushed via OTLP to Jaeger.
  # If a Prometheus metrics endpoint is exposed separately (port 9464),
  # add it here:
  - job_name: 'cakramerp-service'
    static_configs:
      - targets: ['host.docker.internal:6505']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # cakramerp-document — Spring Actuator Prometheus endpoint
  - job_name: 'cakramerp-document'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
